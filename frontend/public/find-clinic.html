<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Medical Clinics - Namma Clinic</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --bg: #f8fafc;
            --text: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        #map-wrapper {
            position: relative;
            background: var(--white);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            border: 4px solid var(--white);
        }

        #map {
            height: 500px;
            width: 100%;
            z-index: 1;
        }

        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Search & Controls */
        .search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 10px;
            width: 90%;
            max-width: 650px;
        }

        .search-box {
            flex: 1;
            background: white;
            padding: 6px 15px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #e2e8f0;
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
        }

        .search-box button {
            padding: 8px 18px;
            font-size: 14px;
        }

        .locate-btn {
            background: white;
            color: var(--primary);
            border: 1px solid #e2e8f0;
            padding: 0 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .locate-btn:hover {
            background: #f8fafc;
            color: var(--primary-dark);
        }

        #info-panel {
            background: var(--white);
            border-radius: 24px;
            padding: 25px;
            box-shadow: var(--shadow);
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clinic-info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .clinic-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .distance-tag {
            background: #ecfdf5;
            color: var(--primary-dark);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .clinic-meta {
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .action-btns {
            display: flex;
            gap: 15px;
        }

        .btn-directions {
            background: var(--secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            height: 48px;
            border-radius: 12px;
            padding: 0 24px;
            color: white;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn-directions:hover {
            opacity: 0.9;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            #map { height: 400px; }
            .container { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Find Nearby Medical Clinics</h1>
            <p class="subtitle">Quickly locate the nearest healthcare facilities and get directions.</p>
        </header>

        <div id="map-wrapper">
            <div class="loading-overlay" id="loader">
                <div class="spinner"></div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="location-input" placeholder="Search for a city or area..." />
                    <button id="search-btn">Search</button>
                </div>
                <button id="btn-current-location" class="locate-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    My Location
                </button>
            </div>
            
            <div id="map"></div>
        </div>

        <div id="info-panel">
            <div class="clinic-info-header">
                <div class="clinic-name" id="display-name">Select a clinic</div>
                <div class="distance-tag" id="display-distance">-- km</div>
            </div>
            <div class="clinic-meta" id="display-address">
                Click on a marker on the map to see details and get directions.
            </div>
            <div class="action-btns">
                <a href="#" id="link-directions" target="_blank" class="btn-directions">
                    <svg width="20" height="20" style="margin-right: 8px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    Get Directions
                </a>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom Map script -->
    <script src="/js/clinic-map.js"></script>
</body>
</html>
