<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Red Rounded Background -->
  <rect width="512" height="512" rx="120" fill="#E30A14" />
  
  <!-- White Cross -->
  <rect x="176" y="76" width="160" height="360" rx="40" fill="#ffffff" />
  <rect x="76" y="176" width="360" height="160" rx="40" fill="#ffffff" />

  <!-- Dark Blue Family / Care Icon -->
  <g fill="#001B44">
    <!-- Adult Head -->
    <circle cx="256" cy="205" r="45" />
    
    <!-- Adult Body -->
    <circle cx="252" cy="270" r="48" />
    
    <!-- Child Head -->
    <circle cx="320" cy="245" r="28" />
  </g>

  <!-- Embracing Arms (V-shape) -->
  <path d="M 160 270 C 180 320, 220 370, 256 390 C 290 370, 320 330, 345 285" 
        fill="none" 
        stroke="#001B44" 
        stroke-width="45" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
